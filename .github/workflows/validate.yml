name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq shellcheck

      - name: Run validation
        run: bash scripts/validate.sh
